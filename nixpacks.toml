# Nixpacks config — tells Railway how to build the pnpm monorepo
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @socialpulse/api exec prisma generate",
  "pnpm --filter @socialpulse/api run build",
]

[start]
cmd = "cd apps/api && npx prisma migrate deploy && cd ../.. && node apps/api/dist/index.js"
