# render.yaml — Render Blueprint for SocialPulse API
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: socialpulse-api
    runtime: node
    region: oregon
    plan: free  # change to "starter" for always-on ($7/mo)
    branch: main

    buildCommand: >
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @socialpulse/api exec prisma generate &&
      pnpm --filter @socialpulse/api run build

    startCommand: node apps/api/dist/index.js

    healthCheckPath: /health

    envVars:
      # ── Static values set in blueprint ─────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

      # ── Secrets — Render will prompt for these on first deploy ──
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

      # ── App URLs ────────────────────────
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

      # ── AI — Google Gemini ──────────────
      # Get key at: https://aistudio.google.com/app/apikey
      - key: GEMINI_API_KEY
        sync: false
      # Optional model overrides (defaults shown):
      # GEMINI_PRO_MODEL=gemini-2.5-pro
      # GEMINI_FLASH_MODEL=gemini-2.5-flash

      # ── Meta (Instagram + Facebook) ─────────
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false

      # ── Google (YouTube OAuth) ──────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── Email / SMTP (password reset) ───────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # ── Optional data APIs ──────────
      - key: DATA365_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
