# render.yaml — Render Blueprint for SocialPulse API
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: socialpulse-api
    runtime: node
    region: oregon
    plan: free  # change to "starter" for always-on ($7/mo)
    branch: main

    buildCommand: >
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @socialpulse/api exec prisma generate &&
      pnpm --filter @socialpulse/api run build

    startCommand: node apps/api/dist/index.js

    healthCheckPath: /health

    envVars:
      # ── Static values set in blueprint ─────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

